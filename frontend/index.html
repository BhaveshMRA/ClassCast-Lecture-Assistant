<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClassCast — Student View</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; padding: 24px;
    background: #f5f5f4; color: #1c1c1c;
    max-width: 900px; margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px 0; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 500; margin-bottom: 24px;
  }
  .status.connected { background: #d4f4dd; color: #1a5e2e; }
  .status.connecting { background: #fff4d4; color: #7a5d00; }
  .status.disconnected { background: #f8d7d7; color: #7a1a1a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .panel {
    background: white; border: 1px solid #e5e5e3;
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .panel h2 {
    font-size: 14px; font-weight: 600; margin: 0 0 12px 0;
    color: #555; text-transform: uppercase; letter-spacing: 0.5px;
  }
  #log {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; max-height: 400px; overflow-y: auto;
    background: #fafaf9; border-radius: 8px; padding: 12px;
  }
  .log-entry { padding: 4px 0; border-bottom: 1px solid #eee; }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: #999; }
  .log-type-heartbeat { color: #1a5e2e; }
  .log-type-test     { color: #1a3e7e; font-weight: 600; }
  .log-type-summary  { color: #5a1a7e; font-weight: 600; }
  .log-type-visual   { color: #7e3e1a; font-weight: 600; }
  .log-type-audit    { color: #555;    font-style: italic; }
  #visual-container {
    min-height: 200px;
    display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 14px;
  }
  #visual-container iframe { width: 100%; min-height: 400px; border: none; }
  #summary-text { color: #1c1c1c; font-size: 16px; line-height: 1.5; }
  #summary-text:empty::before {
    content: "Waiting for the professor to speak...";
    color: #999; font-size: 14px;
  }
</style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
    <h1 style="margin: 0;">ClassCast</h1>
    <button id="notebook-menu-btn" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #555;">☰</button>
  </div>
  <div class="subtitle">Student view</div>

  <div id="status" class="status connecting">
    <span class="dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
  <div id="mic-status-badge" style="display: none; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; background: #e8f5e9; color: #2e7d32; margin-bottom: 24px; vertical-align: top;">
    <span style="width: 8px; height: 8px; background: #4caf50; border-radius: 50%;"></span>
    Professor Mic ON
  </div>

  <div class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <h2 style="margin: 0;">Concept summary</h2>
      <button id="save-concept-btn" style="padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 6px; border: 1px solid #1a3e7e; background: #e8efff; color: #1a3e7e; cursor: pointer;">
        Save to Notebook
      </button>
    </div>
    <div id="summary-text"></div>
  </div>

  <div class="panel">
    <h2>Visual</h2>
    <div id="visual-container">No visual yet</div>
  </div>

  <div class="panel">
    <h2>Event log</h2>
    <div id="log"></div>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;"></div>
  
  <!-- Sidebar Panel -->
  <div id="notebook-sidebar" style="position: fixed; top: 0; right: -350px; width: 350px; height: 100%; background: #f5f5f4; box-shadow: -4px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: right 0.3s ease; display: flex; flex-direction: column;">
    <div style="padding: 20px; border-bottom: 1px solid #e5e5e3; display: flex; justify-content: space-between; align-items: center; background: white;">
      <h2 style="margin: 0; font-size: 18px;">My Notebook</h2>
      <button id="close-sidebar-btn" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #888;">✕</button>
    </div>
    <div id="notebook-list" style="padding: 20px; overflow-y: auto; flex-grow: 1;">
      <div style="color: #999; font-size: 14px; text-align: center; margin-top: 20px;">Notebook is empty.</div>
    </div>
    <div style="padding: 20px; border-top: 1px solid #e5e5e3; background: white; display: flex; gap: 10px;">
      <button id="export-notebook-btn" style="flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border-radius: 6px; border: 1px solid #1a3e7e; background: #e8efff; color: #1a3e7e; cursor: pointer;">Export (.json)</button>
      <button id="import-notebook-btn" style="flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border-radius: 6px; border: 1px solid #555; background: #fafaf9; color: #555; cursor: pointer;">Import (.json)</button>
      <input type="file" id="import-notebook-file" accept=".json" style="display: none;">
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;">
      <div style="padding: 16px 20px; border-bottom: 1px solid #e5e5e3; display: flex; justify-content: space-between; align-items: center;">
        <h2 id="modal-title" style="margin: 0; font-size: 18px;">Saved Concept</h2>
        <button id="close-modal-btn" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #888;">✕</button>
      </div>
      <div style="padding: 20px; overflow-y: auto;">
        <div id="modal-summary" style="font-size: 16px; margin-bottom: 20px; color: #1c1c1c; line-height: 1.5;"></div>
        <div id="modal-visual" style="border: 1px solid #e5e5e3; border-radius: 8px; overflow: hidden; min-height: 300px;"></div>
      </div>
    </div>
  </div>

<script>
  const statusEl = document.getElementById('status');
  const statusTextEl = document.getElementById('status-text');
  const logEl = document.getElementById('log');
  const summaryEl = document.getElementById('summary-text');
  const visualEl = document.getElementById('visual-container');

  // ⚠️  Change this to the teacher laptop's IP when on two machines
  const BACKEND_URL = 'http://10.156.129.19:8000';

  function setStatus(state, text) {
    statusEl.className = `status ${state}`;
    statusTextEl.textContent = text;
  }

  function addLog(type, data) {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-type-${type}">[${type}]</span>
      <span>${JSON.stringify(data)}</span>
    `;
    logEl.insertBefore(entry, logEl.firstChild);
    while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
  }

  let currentConceptTitle = "Unknown Concept";
  let currentVisualHtml = "";

  function handleSummary(data) {
    addLog('summary', { concept: data.concept });
    currentConceptTitle = data.concept || "Unknown Concept";
    summaryEl.textContent = data.text;
  }

  function handleVisual(data) {
    addLog('visual', { concept: data.concept });
    currentConceptTitle = data.concept || "Unknown Concept";
    currentVisualHtml = data.html;
    visualEl.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts';
    iframe.srcdoc = data.html;
    visualEl.appendChild(iframe);
  }

  function handleAudit(data) {
    addLog('audit', data);
  }

  // --- Notebook Logic ---
  
  function getNotebook() {
    return JSON.parse(localStorage.getItem('classcast_notebook') || '[]');
  }
  
  function saveToNotebook() {
    if (!summaryEl.textContent || summaryEl.textContent === "Waiting for the professor to speak...") {
      alert("Nothing to save yet!");
      return;
    }
    const notebook = getNotebook();
    const newItem = {
      id: Date.now().toString(),
      title: currentConceptTitle,
      summary: summaryEl.textContent,
      html: currentVisualHtml,
      timestamp: new Date().toLocaleTimeString()
    };
    notebook.unshift(newItem); // add to top
    localStorage.setItem('classcast_notebook', JSON.stringify(notebook));
    
    // UI Feedback
    const btn = document.getElementById('save-concept-btn');
    const originalText = btn.textContent;
    btn.textContent = "✓ Saved!";
    btn.style.background = "#d4f4dd";
    btn.style.borderColor = "#1a5e2e";
    btn.style.color = "#1a5e2e";
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = "#e8efff";
      btn.style.borderColor = "#1a3e7e";
      btn.style.color = "#1a3e7e";
    }, 2000);
    
    renderNotebookList();
  }

  function renderNotebookList() {
    const notebook = getNotebook();
    const listEl = document.getElementById('notebook-list');
    
    if (notebook.length === 0) {
      listEl.innerHTML = '<div style="color: #999; font-size: 14px; text-align: center; margin-top: 20px;">Notebook is empty.</div>';
      return;
    }
    
    listEl.innerHTML = '';
    notebook.forEach(item => {
      const card = document.createElement('div');
      card.style.background = 'white';
      card.style.border = '1px solid #e5e5e3';
      card.style.borderRadius = '8px';
      card.style.padding = '12px';
      card.style.marginBottom = '12px';
      card.style.cursor = 'pointer';
      
      card.innerHTML = `
        <div style="font-size: 14px; font-weight: 600; color: #1c1c1c; margin-bottom: 4px;">${item.title}</div>
        <div style="font-size: 11px; color: #888;">${item.timestamp}</div>
      `;
      
      card.addEventListener('mouseover', () => card.style.borderColor = '#1a3e7e');
      card.addEventListener('mouseout', () => card.style.borderColor = '#e5e5e3');
      card.addEventListener('click', () => openModal(item));
      
      listEl.appendChild(card);
    });
  }

  function openModal(item) {
    document.getElementById('modal-title').textContent = `${item.title} (${item.timestamp})`;
    document.getElementById('modal-summary').textContent = item.summary;
    
    const visualContainer = document.getElementById('modal-visual');
    visualContainer.innerHTML = '';
    if (item.html) {
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-scripts';
      iframe.srcdoc = item.html;
      iframe.style.width = '100%';
      iframe.style.height = '400px';
      iframe.style.border = 'none';
      visualContainer.appendChild(iframe);
    } else {
      visualContainer.innerHTML = '<div style="padding: 20px; color: #999; text-align: center;">No visual saved for this concept.</div>';
    }
    
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  // --- Event Listeners ---
  document.getElementById('save-concept-btn').addEventListener('click', saveToNotebook);

  document.getElementById('export-notebook-btn').addEventListener('click', () => {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem('classcast_notebook') || '[]');
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "classcast_notebook.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  });

  document.getElementById('import-notebook-btn').addEventListener('click', () => {
    document.getElementById('import-notebook-file').click();
  });

  document.getElementById('import-notebook-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const importedData = JSON.parse(e.target.result);
        if (!Array.isArray(importedData)) throw new Error("Invalid format");
        
        const currentNotebook = getNotebook();
        
        // Append imported items
        importedData.forEach(importedItem => {
          let newTitle = importedItem.title;
          // Check if this exact title already exists in the notebook
          const isDuplicate = currentNotebook.some(item => item.title === importedItem.title);
          if (isDuplicate) {
            newTitle = `${importedItem.title} (1)`;
          }
          
          currentNotebook.push({
            ...importedItem,
            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
            title: newTitle
          });
        });
        
        localStorage.setItem('classcast_notebook', JSON.stringify(currentNotebook));
        renderNotebookList();
        alert(`Successfully imported ${importedData.length} concepts!`);
      } catch (err) {
        alert("Failed to import: Invalid JSON file.");
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // Reset input so same file can be selected again
  });
  
  document.getElementById('notebook-menu-btn').addEventListener('click', () => {
    renderNotebookList();
    document.getElementById('sidebar-overlay').style.display = 'block';
    document.getElementById('notebook-sidebar').style.right = '0';
  });
  
  function closeSidebar() {
    document.getElementById('sidebar-overlay').style.display = 'none';
    document.getElementById('notebook-sidebar').style.right = '-350px';
  }
  document.getElementById('close-sidebar-btn').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
  
  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }
  document.getElementById('close-modal-btn').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'modal-overlay') closeModal();
  });

  // --- Connection Logic ---

  async function loadHistory() {
    try {
      const r = await fetch(`${BACKEND_URL}/history`);
      const j = await r.json();
      if (j.events) {
        for (const evt of j.events) {
          if (evt.event_type === 'summary') handleSummary(evt.data);
          if (evt.event_type === 'visual') handleVisual(evt.data);
          if (evt.event_type === 'audit') handleAudit(evt.data);
        }
      }
    } catch (e) {
      console.warn("Could not load history", e);
    }
  }

  function connect() {
    setStatus('connecting', 'Connecting...');
    const source = new EventSource(`${BACKEND_URL}/stream`);

    source.addEventListener('open', () => {
      setStatus('connected', 'Connected');
    });

    source.addEventListener('heartbeat', (event) => {
      const data = JSON.parse(event.data);
      addLog('heartbeat', data);
      setStatus('connected', `Connected — ${data.clients} client(s), tick ${data.tick}`);
    });

    source.addEventListener('test', (event) => {
      addLog('test', JSON.parse(event.data));
    });

    source.addEventListener('summary', (event) => {
      handleSummary(JSON.parse(event.data));
    });

    source.addEventListener('visual', (event) => {
      handleVisual(JSON.parse(event.data));
    });

    source.addEventListener('audit', (event) => {
      handleAudit(JSON.parse(event.data));
    });

    source.addEventListener('mic_status', (event) => {
      const data = JSON.parse(event.data);
      const badge = document.getElementById('mic-status-badge');
      if (data.status === 'on') {
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    });

    source.addEventListener('error', () => {
      setStatus('disconnected', 'Disconnected — reconnecting...');
    });
  }

  loadHistory().then(() => {
    connect();
  });
</script>
</body>
</html>
